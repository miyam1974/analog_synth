name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Show toolchain
        shell: pwsh
        run: |
          cmake --version
          cl 2>&1 | Select-Object -First 1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel

      - name: Package
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter AnalogSynth.exe |
            Select-Object -First 1
          if (-not $exe) {
            Write-Error "AnalogSynth.exe not found under build/"
            exit 1
          }
          Write-Host "Found: $($exe.FullName)"

          $tag = "${{ github.ref_name }}"
          if ($tag -eq "Release" -or [string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }
          $dist = "dist/NEXUS-OSC-Windows-x64-$tag"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item $exe.FullName $dist
          Copy-Item "LICENSE" $dist
          Compress-Archive -Path $dist -DestinationPath "$dist.zip" -Force

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
