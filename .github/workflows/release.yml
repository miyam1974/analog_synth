name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        shell: pwsh
        run: cmake --version

      - name: Configure
        shell: pwsh
        run: |
          $attempts = @(
            @{ Generator = "Visual Studio 18 2026"; Arch = "x64" },
            @{ Generator = "Visual Studio 17 2022"; Arch = "x64" }
          )
          foreach ($attempt in $attempts) {
            Write-Host "Trying $($attempt.Generator) ..."
            if (Test-Path build) { Remove-Item -Recurse -Force build }
            cmake -S . -B build -G $attempt.Generator -A $attempt.Arch
            if ($LASTEXITCODE -eq 0) { exit 0 }
          }
          Write-Error "CMake configure failed for all generators."
          exit 1

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dist = "dist/NEXUS-OSC-Windows-x64-$tag"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "build/AnalogSynth_artefacts/Release/AnalogSynth.exe" $dist
          Copy-Item "LICENSE" $dist
          Compress-Archive -Path $dist -DestinationPath "$dist.zip" -Force

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
