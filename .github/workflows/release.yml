name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        shell: pwsh
        run: |
          cmake --version
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property displayName

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 18 2026" -A x64

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          $exePath = "build/AnalogSynth_artefacts/Release/AnalogSynth.exe"
          if (-not (Test-Path $exePath)) {
            $exe = Get-ChildItem -Path build -Recurse -Filter AnalogSynth.exe |
              Select-Object -First 1
            if (-not $exe) {
              Write-Error "AnalogSynth.exe not found under build/"
              exit 1
            }
            $exePath = $exe.FullName
          }
          Write-Host "Found: $exePath"

          $tag = "${{ github.ref_name }}"
          if ($tag -eq "Release" -or [string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }
          $dist = "dist/NEXUS-OSC-Windows-x64-$tag"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item $exePath $dist
          Copy-Item "LICENSE" $dist
          Compress-Archive -Path $dist -DestinationPath "$dist.zip" -Force

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
